<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>배열관련함수(순회함수)</h3>
    <!-- 배열에 반복을 돌려주는 함수들 -->

    <p>
        1. forEach : 배열의 모든 인덱스에 대해 반복을 수행해주는 함수,
        jQuery의 each 메소드와 유사한 구조
        <br>

        2. map : forEach 함수와 마찬가지로 배열에 대한 반복을 수행하나,
        매번 리턴되는 값을 다시 받아서 새로운 배열에 담는 구조
        <br>

        3. redyce : 배열에 대한 반복을 수행할 때,
        해당 배열의 값을 이용해서 특정값을 도출하거나 재가공할 때 사용
        <br>
    </p>

    
</body>
</html>
